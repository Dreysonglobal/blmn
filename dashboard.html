<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard - Believers Leadership Mission & Networks</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        
        <!-- Favicon and Apple Touch Icon -->
        <link rel="apple-touch-icon" sizes="180x180" href="images/logo.JPEG">
        <link rel="icon" type="image/png" sizes="32x32" href="images/logo.JPEG">
        <link rel="icon" type="image/png" sizes="16x16" href="images/logo.JPEG">
        <link rel="icon" type="image/x-icon" href="images/logo.JPEG">
        <link rel="shortcut icon" href="images/logo.JPEG" type="image/x-icon">
        
        <!-- Open Graph / Social Media Meta Tags -->
        <meta property="og:image" content="images/logo.JPEG">
        <meta property="og:image:width" content="512">
        <meta property="og:image:height" content="512">
        <meta property="og:image:type" content="image/png">
        <meta property="og:image:alt" content="BLM&N Logo">
        
        <meta name="twitter:image" content="images/logo.JPEG">
        
        <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
        <script src="https://cdn.tiny.cloud/1/2xvmsdnwej6vczv1num3alnqt0d0ru3gynilwb7z5itpl269/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.11/purify.min.js"></script>
    </head>
<body class="dashboard-page">
    <!-- Dashboard Header -->
    <header class="dashboard-header">
        <div class="container">
            <div class="dashboard-logo">
                <div class="logo-icon">
                    <img src="images/logo.JPEG" alt="BLM&N Logo" class="logo-image">
                </div>
                <h1>Admin Dashboard</h1>
            </div>
            
            <div class="dashboard-actions">
                <button id="logout-btn" class="btn btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <nav>
                <ul>
                    <li class="active"><a href="#posts-section"><i class="fas fa-newspaper"></i> Manage Posts</a></li>
                    <li><a href="#create-section"><i class="fas fa-plus-circle"></i> Create Post</a></li>
                    <li><a href="#media-section"><i class="fas fa-images"></i> Media Library</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div id="message" class="message"></div>
            
            <!-- Create/Edit Post Section -->
            <section id="create-section" class="dashboard-section">
                <h2><i class="fas fa-edit"></i> Create New Post</h2>
                
                <div class="post-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="post-title">Post Title *</label>
                            <input type="text" id="post-title" placeholder="Enter post title">
                        </div>
                        
                        <div class="form-group">
                            <label for="post-category">Category *</label>
                            <select id="post-category">
                                <option value="leadership-insights">Leadership Insights</option>
                                <option value="biblical-analysis">Biblical Analysis</option>
                                <option value="case-studies">Case Studies</option>
                                <option value="leadership-series">Leadership Series</option>
                                <option value="practical-frameworks">Practical Frameworks</option>
                                <option value="announcements">Announcements</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="post-summary">Summary *</label>
                        <textarea id="post-summary" rows="3" placeholder="Brief summary for homepage"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="post-content">Full Content *</label>
                        <textarea id="post-content" rows="10" placeholder="Full article content"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="post-image">Image URL</label>
                            <input type="text" id="post-image" placeholder="https://example.com/image.jpg">
                            <small>Or upload an image below</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="image-upload">Upload Image</label>
                            <input type="file" id="image-upload" accept="image/*">
                            <div id="upload-progress" class="progress-bar" style="display: none;">
                                <div class="progress-fill"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <input type="hidden" id="post-id">
                        <button id="save-post-btn" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Publish Post
                        </button>
                        <button id="clear-form-btn" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Clear Form
                        </button>
                    </div>
                </div>
            </section>

            <!-- Manage Posts Section -->
            <section id="posts-section" class="dashboard-section">
                <h2><i class="fas fa-list"></i> Manage Existing Posts</h2>
                <div class="posts-list" id="admin-posts-container">
                    <!-- Posts will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
