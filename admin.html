<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transport and Society Online</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        
        <!-- Favicon and Apple Touch Icon -->
        <link rel="apple-touch-icon" sizes="180x180" href="images/logo.png">
        <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
        <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
        <link rel="icon" type="image/x-icon" href="images/logo.png">
        <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
        
        <!-- Open Graph / Social Media Meta Tags -->
        <meta property="og:image" content="images/logo.png">
        <meta property="og:image:width" content="512">
        <meta property="og:image:height" content="512">
        <meta property="og:image:type" content="image/png">
        <meta property="og:image:alt" content="Transport and Society Online Logo">
        
        <meta name="twitter:image" content="images/logo.png">
        
        <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    </head>
<body class="admin-page">
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <img src="images/logo.png" alt="Transport and Society Online Logo" class="logo-image">
            </div>
            <h1>Transport and Society Online</h1>
            <h2>Admin Portal</h2>
        </div>
        
        <div class="login-form">
            <div id="login-message" class="message"></div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="admin@example.com">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            
            <button id="login-btn" class="btn btn-primary">Login to Dashboard</button>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
            </div>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
